name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -e ".[test]"
      - name: Run Linux-compatible tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_desktop_tools.py \
            -v --tb=short
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          python -m pytest tests/ --ignore=tests/test_desktop_tools.py --cov=src --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage
          path: coverage.xml

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install package and security scanners
        run: |
          pip install -e ".[test]"
          pip install bandit pip-audit zizmor uv
      - name: Bandit static security scan
        run: bandit -q -lll -r src -x tests
      - name: Dependency vulnerability scan
        run: |
          uv export --extra test --format requirements-txt \
            --no-hashes --no-emit-project \
            --output-file /tmp/winremote-requirements.txt
          pip-audit -r /tmp/winremote-requirements.txt
      - name: GitHub Actions security scan
        run: zizmor --persona=auditor .github/workflows
